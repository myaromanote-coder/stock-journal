app = "stock-journal-app"
primary_region = "nrt"  # 도쿄 (한국에서 가장 가까운 서버)

[build]

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/stock-journal.db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "stock_journal_data"
  destination = "/data"
